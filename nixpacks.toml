[phases.setup]
# Используем поддерживаемую версию Node вместо снятой с поддержки 18.x.
# Caddy оставляем на автоматическое определение Nixpacks, чтобы не было конфликтов
# между разными наборами nixpkgs, которые генерирует план.
nixPkgs = ["nodejs_20", "bun"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["bun run build"]

[start]
cmd = "exec caddy run --config /assets/Caddyfile --adapter caddyfile 2>&1"
